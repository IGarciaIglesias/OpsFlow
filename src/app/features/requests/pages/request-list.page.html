<app-header></app-header>

<div class="page-container">
  <div class="page-header">
    <h1>Requests</h1>

    <button
      *ngIf="canCreate()"
      class="btn primary"
      (click)="goToCreate()">
      Crear solicitud
    </button>
  </div>

  <div class="filters-bar">
    <div class="filter-group">
      <label for="status">Estado</label>
      <select
        id="status"
        [value]="selectedStatus"
        (change)="onStatusChange($any($event.target).value)">
        <option value="">Todos</option>
        <option *ngFor="let status of availableStatuses" [value]="status">
          {{ status }}
        </option>
      </select>
    </div>

    <button
      class="btn secondary"
      type="button"
      (click)="clearFilters()"
      [disabled]="!selectedStatus">
      Limpiar filtro
    </button>
  </div>

  <hr />

  <p *ngIf="loading">Cargando...</p>

  <table *ngIf="requests.length > 0; else empty">
    <thead>
      <tr>
        <th>ID</th>
        <th>Estado</th>
        <th>Título</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let r of requests">
        <td>
          <a [routerLink]="['/requests', r.id]">
            {{ r.id }}
          </a>
        </td>

        <td>
          <span class="status" [class]="r.status">
            {{ r.status }}
          </span>
        </td>

        <td>{{ r.title }}</td>

        <td class="actions">
          <button
            *ngIf="r.status === 'DRAFT'"
            class="btn warning"
            (click)="submit(r.id)">
            Enviar
          </button>

          <button
            *ngIf="r.status === 'VALIDATED' && canApprove()"
            class="btn success"
            (click)="approve(r.id)">
            Aprobar
          </button>

          <button
            *ngIf="r.status === 'PENDING_VALIDATION' || r.status === 'VALIDATED'"
            class="btn danger"
            (click)="reject(r.id)">
            Rechazar
          </button>

          <button
            *ngIf="r.status === 'REJECTED' || r.status === 'FAILED'"
            class="btn warning"
            (click)="retry(r.id)">
            Reintentar
          </button>

          <button
            *ngIf="r.status !== 'COMPLETED' && r.status !== 'CANCELLED' && canApprove()"
            class="btn secondary"
            (click)="cancel(r.id)">
            Cancelar
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <ng-template #empty>
    <p>No hay solicitudes para el filtro seleccionado.</p>
  </ng-template>

  <div class="pagination" *ngIf="totalPages > 1">
    <button
      class="btn secondary"
      [disabled]="page === 0"
      (click)="page = page - 1; reload()">
      Anterior
    </button>

    <span>Página {{ page + 1 }} de {{ totalPages }}</span>

    <button
      class="btn secondary"
      [disabled]="page + 1 >= totalPages"
      (click)="page = page + 1; reload()">
      Siguiente
    </button>
  </div>
</div>
