<app-header></app-header>

<div class="page-container">
  <div class="page-header">
    <h1>Nueva solicitud</h1>
  </div>

  <form class="request-form" (ngSubmit)="create()">
    <div class="form-group">
      <label for="title">Título</label>
      <input
        id="title"
        name="title"
        type="text"
        [(ngModel)]="title"
        [disabled]="loading"
        maxlength="120"
        required />
    </div>

    <div class="form-group">
      <label for="description">Descripción</label>
      <textarea
        id="description"
        name="description"
        [(ngModel)]="description"
        [disabled]="loading"
        rows="6"
        required></textarea>
    </div>

    <p *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </p>

    <div class="form-actions">
      <button
        type="button"
        class="btn secondary"
        [disabled]="loading"
        (click)="cancel()">
        Cancelar
      </button>

      <button
        type="submit"
        class="btn primary"
        [disabled]="loading">
        {{ loading ? 'Creando...' : 'Crear solicitud' }}
      </button>
    </div>
  </form>
</div>
