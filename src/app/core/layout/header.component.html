<header class="app-header">
  <div class="header-left">
    <a routerLink="/requests" class="brand">OpsFlow Manager</a>

    <nav class="nav-links">
      <a routerLink="/requests" routerLinkActive="active">Requests</a>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    </nav>
  </div>

  <div class="header-right">
    <span class="role-badge" *ngIf="role">
      {{ role }}
    </span>

    <button class="btn secondary" type="button" (click)="logout()">
      Logout
    </button>
  </div>
</header>
