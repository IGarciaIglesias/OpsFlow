name: backend-ci

on:
  push:
    branches: [ backend, main ]
  pull_request:
    branches: [ backend, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # IMPORTANTE para SonarCloud (PRs y blame)

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build, test and analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify sonar:sonar \
            -Dsonar.projectKey=igarciaiglesias-1_opsflow \
            -Dsonar.organization=igarciaiglesias-1 \
            -Dsonar.host.url=https://sonarcloud.io